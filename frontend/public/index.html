<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WedLink — Admin Dashboard</title>
  <meta name="description" content="WedLink Admin Dashboard — Create and manage beautiful wedding invitation links." />
  <meta name="robots" content="noindex, nofollow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/admin.css" />

  <style>
    .field-error { display: none; color: #f87171; font-size: 12px; margin-top: 2px; }
    .form-group { margin-bottom: 18px; }
    .modal-form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 28px; }

    /* Limit warning banner */
    #limit-warning {
      display: none;
      background: rgba(212, 175, 55, 0.08);
      border: 1px solid rgba(212, 175, 55, 0.25);
      color: var(--gold-light);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    /* User badge in navbar */
    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-soft);
      background: var(--bg-card);
    }
    .user-badge .user-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
    }
  </style>
</head>
<body class="admin-layout">

  <!-- ─── Navbar ─────────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="logo-icon">
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="14" r="5"></circle><circle cx="15" cy="11" r="5"></circle><path d="M7 9a2.5 2.5 0 0 1 4 0"></path><path d="M13 6a2.5 2.5 0 0 1 4 0"></path></svg>
      </div>
      <span class="logo-text">WedLink</span>
    </a>

    <div style="display:flex;align-items:center;gap:12px">
      <!-- Logged-in user badge -->
      <div class="user-badge">
        <span class="user-dot"></span>
        <span id="nav-username">…</span>
      </div>

      <button id="open-modal-btn" class="btn btn-primary">
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6.3 6.3l2.8 2.8M14.9 14.9l2.8 2.8M17.7 6.3l-2.8 2.8M9.1 14.9l-2.8 2.8"></path></svg>
        New Invitation
      </button>

      <button id="logout-btn" class="btn btn-ghost btn-sm" title="Sign out">
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"></path></svg>
        Sign out
      </button>
    </div>
  </nav>

  <!-- ─── Hero ───────────────────────────────────────────────── -->
  <section class="page-hero">
    <div class="hero-eyebrow">Wedding Invitation Manager</div>
    <h1>Craft Moments That Last Forever</h1>
    <p class="subtitle">Generate beautiful, shareable wedding invitation links in seconds.</p>
    <button id="open-modal-btn-hero" class="btn btn-primary">
      <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      Create Your First Invitation
    </button>
  </section>

  <!-- ─── Stats Strip ─────────────────────────────────────────── -->
  <div class="stats-strip">
    <div class="stat-item">
      <div class="stat-value" id="stat-invitations">—</div>
      <div class="stat-label">Invitations</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="stat-limit">—</div>
      <div class="stat-label">Slots used</div>
    </div>
    <div class="stat-item">
      <div class="stat-value">10</div>
      <div class="stat-label">Max per account</div>
    </div>
  </div>

  <!-- ─── Main Content ─────────────────────────────────────────── -->
  <main class="main-content">

    <!-- Limit warning (shown at 8+) -->
    <div id="limit-warning"></div>

    <div class="section-header">
      <h2 class="section-title">Your Invitations</h2>
      <button class="btn btn-ghost btn-sm" onclick="loadInvitations()">
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
        Refresh
      </button>
    </div>

    <div id="invitations-grid"><!-- rendered by admin.js --></div>
  </main>

  <!-- ─── Create Modal ──────────────────────────────────────── -->
  <div class="modal-overlay" id="create-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title" style="font-size:22px; display:flex; align-items:center; gap:8px;">
          <svg class="svg-icon" style="color:var(--gold);" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M6.3 6.3l2.8 2.8M14.9 14.9l2.8 2.8M17.7 6.3l-2.8 2.8M9.1 14.9l-2.8 2.8"></path></svg>
          New Invitation
        </h2>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>

      <form id="create-form" novalidate>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="bride">Bride's Name (EN)</label>
            <input class="form-input" id="bride" name="bride" type="text"
                   placeholder="Sarah" autocomplete="off" />
            <span class="field-error" id="error-bride"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="groom">Groom's Name (EN)</label>
            <input class="form-input" id="groom" name="groom" type="text"
                   placeholder="James" autocomplete="off" />
            <span class="field-error" id="error-groom"></span>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="bride_fa">Bride's Name (FA / optional)</label>
            <input class="form-input" id="bride_fa" name="bride_fa" type="text"
                   placeholder="سارا" autocomplete="off" />
            <span class="field-error" id="error-bride_fa"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="groom_fa">Groom's Name (FA / optional)</label>
            <input class="form-input" id="groom_fa" name="groom_fa" type="text"
                   placeholder="آرش" autocomplete="off" />
            <span class="field-error" id="error-groom_fa"></span>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="date">Wedding Date</label>
            <input class="form-input" id="date" name="date" type="date" />
            <span class="field-error" id="error-date"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="time">
              Time
              <span style="color:var(--text-muted);font-weight:400;text-transform:none">(optional)</span>
            </label>
            <input class="form-input" id="time" name="time" type="time" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="venue">Venue / Address (EN)</label>
            <input class="form-input" id="venue" name="venue" type="text"
                   placeholder="The Grand Ballroom, New York" />
            <span class="field-error" id="error-venue"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="venue_fa">Venue / Address (FA / optional)</label>
            <input class="form-input" id="venue_fa" name="venue_fa" type="text"
                   placeholder="باغ تالار هما، تهران" />
            <span class="field-error" id="error-venue_fa"></span>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="slug">
              Custom Link Slug
              <span style="color:var(--text-muted);font-weight:400;text-transform:none">(optional)</span>
            </label>
            <input class="form-input" id="slug" name="slug" type="text"
                   placeholder="e.g. sarah-and-james" pattern="[a-z0-9-]*" />
            <span class="field-error" id="error-slug"></span>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            Cover Image
            <span style="color:var(--text-muted);font-weight:400;text-transform:none">(max 5MB)</span>
          </label>
          <div style="display:flex;gap:12px;margin-bottom:8px;">
            <input class="form-input" id="image_url" name="image_url" type="url"
                   placeholder="Paste URL or upload a file..." style="flex:1" />
            <label class="btn btn-ghost" style="cursor:pointer;white-space:nowrap;padding:0 16px; display:inline-flex; align-items:center; gap:8px;">
              <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"></path></svg>
              Upload
              <input type="file" id="image_file" accept="image/*" style="display:none;" />
            </label>
          </div>
          <span class="field-error" id="error-image_file"></span>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="theme">Theme</label>
            <select class="form-input" id="theme" name="theme">
              <option value="modern-minimal">Modern Minimal</option>
              <option value="dark-luxury">Dark Luxury</option>
              <option value="light-floral">Light Floral</option>
              <option value="royal-elegance">Royal Elegance</option>
              <option value="starlight-glamour">Starlight Glamour</option>
              <option value="enchanted-forest">Enchanted Forest</option>
            </select>
          </div>
        </div>
        <input type="hidden" id="desktop_layout" name="desktop_layout" value="3d-card" />
        <input type="hidden" id="mobile_layout" name="mobile_layout" value="3d-card" />

        <div class="form-group">
          <label class="form-label" for="message">
            Personal Message (EN)
            <span style="color:var(--text-muted);font-weight:400;text-transform:none">(optional)</span>
          </label>
          <textarea class="form-textarea" id="message" name="message"
                    placeholder="Share a heartfelt message with your guests…"
                    style="min-height:88px"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="message_fa">
            Personal Message (FA)
            <span style="color:var(--text-muted);font-weight:400;text-transform:none">(optional)</span>
          </label>
          <textarea class="form-textarea" id="message_fa" name="message_fa"
                    placeholder="پیام صمیمانه خود را با مهمانان به اشتراک بگذارید..."
                    style="min-height:88px"></textarea>
        </div>

        <div class="modal-form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">
            ✨ Create Invitation
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ─── Toast Container ──────────────────────────────────────── -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ─── Footer ───────────────────────────────────────────────── -->
  <footer style="padding:28px 40px;text-align:center;border-top:1px solid var(--border);color:var(--text-muted);font-size:13px;margin-top:auto">
    <span style="display:inline-flex; align-items:center; gap:6px; justify-content:center;">Made with <svg class="svg-icon" style="color:var(--gold); width:18px; height:18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="14" r="5"></circle><circle cx="15" cy="11" r="5"></circle><path d="M7 9a2.5 2.5 0 0 1 4 0"></path><path d="M13 6a2.5 2.5 0 0 1 4 0"></path></svg> by <strong style="color:var(--gold)">WedLink</strong></span>
    &nbsp;·&nbsp;
    <a href="https://github.com/nos486/wedlink" target="_blank" rel="noopener"
       style="color:var(--rose);text-decoration:none">GitHub</a>
  </footer>

  <!-- auth.js must come before admin.js -->
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
