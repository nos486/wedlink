<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>
  <meta name="description" content="You are cordially invited." />
  
  <!-- Fonts: Inter, Playfair Display, Great Vibes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/invite.css" />
</head>
<body id="invite-body" class="invite-page theme-modern-minimal layout-image-top">

  <!-- Loading state -->
  <div id="invite-loading" style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:var(--text-muted);">
    <div style="text-align:center;">
      <div style="font-size:32px;animation:spin 1s linear infinite;color:var(--gold);">
        <svg class="svg-icon" style="width:48px;height:48px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="14" r="5"></circle><circle cx="15" cy="11" r="5"></circle><path d="M7 9a2.5 2.5 0 0 1 4 0"></path><path d="M13 6a2.5 2.5 0 0 1 4 0"></path></svg>
      </div>
      <p style="margin-top:20px; font-family:'Playfair Display',serif; font-size:16px;">Loading invitation...</p>
    </div>
  </div>
  <style>@keyframes spin { 100% { transform:rotate(360deg); } }</style>

  <!-- Error state -->
  <div id="invite-error" style="display:none;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:var(--text-muted);text-align:center;">
    <div>
      <div style="font-size:48px;margin-bottom:16px;color:#f87171;">
        <svg class="svg-icon" style="width:64px;height:64px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      </div>
      <h1 id="error-title" style="color:var(--text);margin:0 0 12px;font-family:'Playfair Display',serif;">Invitation Not Found</h1>
      <p id="error-detail" style="margin:0;">The link might be invalid or expired.</p>
    </div>
  </div>

  <!-- Main Content -->
  <main id="invite-main" class="inv-container" style="display:none;">
    
    <!-- Image Half -->
    <div class="inv-image-wrapper">
      <img id="invite-image" class="inv-image" src="" alt="Couple" style="display:none;" />
      <div id="invite-image-placeholder" class="inv-image-placeholder">
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="14" r="5"></circle><circle cx="15" cy="11" r="5"></circle><path d="M7 9a2.5 2.5 0 0 1 4 0"></path><path d="M13 6a2.5 2.5 0 0 1 4 0"></path></svg>
      </div>
    </div>

    <!-- Text Half -->
    <div class="inv-content-wrapper">
      <!-- Ornaments -->
      <svg class="ornament ornament-top-left" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M0 0 L50 0 C50 50, 0 50, 0 100 Z" fill="currentColor"/></svg>
      <svg class="ornament ornament-bottom-right" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M100 100 L50 100 C50 50, 100 50, 100 0 Z" fill="currentColor"/></svg>
      <svg class="ornament-divider" viewBox="0 0 200 20" xmlns="http://www.w3.org/2000/svg"><path d="M0 10 L80 10 L100 0 L120 10 L200 10" stroke="currentColor" fill="none" stroke-width="1.25"/></svg>

      <div class="inv-eyebrow inv-animate d-1">You are cordially invited to the wedding of</div>
      
      <h1 id="couple-names" class="inv-names inv-animate d-2">Bride & Groom</h1>
      
      <div class="inv-divider inv-animate d-3"></div>

      <div class="inv-details inv-animate d-4">
        <div class="inv-detail-item">
          <span class="inv-icon">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
          </span>
          <span id="detail-date">January 1, 2025</span>
        </div>
        <div id="time-container" class="inv-detail-item" style="display:none;">
          <span class="inv-icon">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          </span>
          <span id="detail-time">5:00 PM</span>
        </div>
        <div class="inv-detail-item">
          <span class="inv-icon">
            <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          </span>
          <span id="detail-venue">The Grand Venue</span>
        </div>
      </div>

      <div id="message-section" class="inv-message inv-animate d-5" style="display:none;">
        <p id="invite-message"></p>
      </div>

      <div class="inv-countdown inv-animate d-5" id="countdown-grid">
        <div class="cd-box"><div class="cd-val" id="cd-days">00</div><div class="cd-lbl">Days</div></div>
        <div class="cd-box"><div class="cd-val" id="cd-hours">00</div><div class="cd-lbl">Hours</div></div>
        <div class="cd-box"><div class="cd-val" id="cd-mins">00</div><div class="cd-lbl">Mins</div></div>
        <div class="cd-box"><div class="cd-val" id="cd-secs">00</div><div class="cd-lbl">Secs</div></div>
      </div>

      <!-- RSVP Section -->
      <div id="rsvp-section" class="inv-rsvp-section inv-animate d-5">
        <h2 class="rsvp-heading">RSVP</h2>
        <p class="rsvp-subheading">Kindly respond</p>
        
        <form id="rsvp-form" class="rsvp-form" novalidate>
          <div class="rsvp-form-group">
            <input class="rsvp-input" id="guest_name" name="guest_name" type="text" placeholder="Your Full Name" required autocomplete="off" />
          </div>
          
          <div class="rsvp-toggle-group">
            <label class="rsvp-toggle-btn active" id="btn-attending-yes">
              <input type="radio" name="attending" value="yes" checked style="display:none;" />
              <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
              <span>Joyfully Accepts</span>
            </label>
            <label class="rsvp-toggle-btn" id="btn-attending-no">
              <input type="radio" name="attending" value="no" style="display:none;" />
              <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
              <span>Regretfully Declines</span>
            </label>
          </div>
          
          <div class="rsvp-form-group">
            <textarea class="rsvp-textarea" id="guest_message" name="guest_message" placeholder="Send a warm message to the couple (optional)..." rows="3"></textarea>
          </div>
          
          <button type="submit" class="rsvp-submit-btn" id="rsvp-submit-btn">
            <span>Send Response</span>
          </button>
        </form>
        
        <div id="rsvp-response-message" class="rsvp-response-message" style="display:none;"></div>
      </div>
    </div>

  </main>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/invite.js"></script>
</body>
</html>
