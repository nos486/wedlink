<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Invitation</title>
  <meta name="description" content="You are cordially invited." />
  
  <!-- Fonts: Inter, Playfair Display, Great Vibes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/invite.css" />
</head>
<body id="invite-body" class="invite-page theme-modern-minimal layout-image-top">

  <!-- Loading state -->
  <div id="invite-loading" style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:var(--text-muted);">
    <div style="text-align:center;">
      <div style="font-size:32px;animation:spin 1s linear infinite;color:var(--gold);">
        <svg class="svg-icon" style="width:48px;height:48px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="14" r="5"></circle><circle cx="15" cy="11" r="5"></circle><path d="M7 9a2.5 2.5 0 0 1 4 0"></path><path d="M13 6a2.5 2.5 0 0 1 4 0"></path></svg>
      </div>
      <p style="margin-top:20px; font-family:'Playfair Display',serif; font-size:16px;">Loading invitation...</p>
    </div>
  </div>
  <style>@keyframes spin { 100% { transform:rotate(360deg); } }</style>

  <!-- Error state -->
  <div id="invite-error" style="display:none;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;color:var(--text-muted);text-align:center;">
    <div>
      <div style="font-size:48px;margin-bottom:16px;color:#f87171;">
        <svg class="svg-icon" style="width:64px;height:64px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
      </div>
      <h1 id="error-title" style="color:var(--text);margin:0 0 12px;font-family:'Playfair Display',serif;">Invitation Not Found</h1>
      <p id="error-detail" style="margin:0;">The link might be invalid or expired.</p>
    </div>
  </div>

  <!-- Main Content -->
  <main id="invite-main" class="inv-container" style="display:none;">
    
    <div class="invite-card-wrapper">
      <div class="card-perspective">
        <div class="card-3d" id="invitation-card">
          
          <!-- Front Side -->
          <div class="card-side card-front">
            <div class="card-front-decor">
              <svg class="wreath-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="42" fill="none" stroke="var(--inv-accent)" stroke-width="1.2" stroke-dasharray="1 1.5"/>
                <polygon points="50,6 87,27 87,73 50,94 13,73 13,27" fill="none" stroke="var(--inv-accent)" stroke-dasharray="1.5 2.5" stroke-width="0.75" opacity="0.6"/>
              </svg>
            </div>
            
            <div class="card-front-content">
              <div class="save-the-date">Save The Date</div>
              
              <div class="card-front-photo-frame">
                <img id="invite-image" class="card-front-photo" src="" alt="Couple" style="display:none;" />
                <div id="invite-image-placeholder" class="card-front-placeholder">
                  <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="9" cy="14" r="5"></circle><circle cx="15" cy="11" r="5"></circle><path d="M7 9a2.5 2.5 0 0 1 4 0"></path><path d="M13 6a2.5 2.5 0 0 1 4 0"></path></svg>
                </div>
              </div>
              
              <h1 id="couple-names-front" class="inv-names-front">Bride & Groom</h1>
              
              <div class="inv-divider-front"></div>
              
              <div id="detail-date-front" class="inv-date-front">January 1, 2025</div>
            </div>
          </div>
          
          <!-- Back Side -->
          <div class="card-side card-back">
            <div class="card-back-decor">
              <svg class="wreath-svg-back" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <polygon points="50,6 87,27 87,73 50,94 13,73 13,27" fill="none" stroke="var(--inv-accent)" stroke-width="0.5" opacity="0.35"/>
              </svg>
            </div>
            <div class="card-back-content">
              <div class="inv-eyebrow">You are cordially invited to the wedding of</div>
              
              <h2 id="couple-names-back" class="inv-names-back">Bride & Groom</h2>
              
              <svg class="ornament-divider" viewBox="0 0 200 20" xmlns="http://www.w3.org/2000/svg"><path d="M0 10 L80 10 L100 0 L120 10 L200 10" stroke="currentColor" fill="none" stroke-width="1.25"/></svg>
              
              <div class="inv-details">
                <div class="inv-detail-item">
                  <span class="inv-icon">
                    <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                  </span>
                  <span id="detail-date">January 1, 2025</span>
                </div>
                <div id="time-container" class="inv-detail-item" style="display:none;">
                  <span class="inv-icon">
                    <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                  </span>
                  <span id="detail-time">5:00 PM</span>
                </div>
                <div class="inv-detail-item">
                  <span class="inv-icon">
                    <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                  </span>
                  <span id="detail-venue">The Grand Venue</span>
                </div>
              </div>

              <div id="message-section" class="inv-message" style="display:none;">
                <p id="invite-message"></p>
              </div>

              <div class="inv-countdown" id="countdown-grid">
                <div class="cd-box"><div class="cd-val" id="cd-days">00</div><div class="cd-lbl">Days</div></div>
                <div class="cd-box"><div class="cd-val" id="cd-hours">00</div><div class="cd-lbl">Hours</div></div>
                <div class="cd-box"><div class="cd-val" id="cd-mins">00</div><div class="cd-lbl">Mins</div></div>
              </div>
            </div>
          </div>
          
        </div>
      </div>
      
      <!-- Action Bar -->
      <div class="invite-actions">
        <button id="flip-btn" class="btn-flip">
          <svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path></svg>
          <span id="flip-btn-text">Flip Card</span>
        </button>

        <a href="#" id="lang-switcher" class="lang-switcher-btn">
          <span id="lang-text">FA</span>
        </a>
      </div>
    </div>

  </main>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/invite.js"></script>
</body>
</html>
